name: Docker

on:
  push:
    branches:
      - "*"  # Trigger on every push to any branch
    tags:
      - "v*.*.*"  # Optional: Trigger on version tags like v1.0.0
  pull_request:
    branches:
      - "main"
  schedule:
    - cron: '20 17 * * *'  # Cron job (daily at 17:20 UTC)

env:
  REGISTRY: ghcr.io  # GitHub Container Registry
  IMAGE_NAME: "globaltechinfo/umd"  # Lowercase image name

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # To allow signing of the Docker image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Checkout code

      # Install Cosign (if not a PR)
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.5.0  # Version of cosign
        with:
          cosign-release: 'v2.2.4'

      # Set up BuildKit for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # Log into GitHub Container Registry
      - name: Log into GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}  # GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}  # GitHub token

      # Extract Docker metadata (tags, labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}  # Image name format

      # Build and push Docker image to GitHub Container Registry
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true  # Push to GHCR
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest  # Tag as 'latest'
          cache-from: type=gha  # Use GitHub Actions cache
          cache-to: type=gha,mode=max  # Cache Docker layers

      # Sign the Docker image (only if not a PR)
      - name: Sign the Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
        
